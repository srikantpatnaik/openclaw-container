services:
  ai-container-test:
    build: .
    container_name: aihost-test
    hostname: aihost-test
    ports:
      - "2223:22"
      - "8083:8080"
    volumes:
      - ~/.ssh:/home/aiuser/.ssh:ro
      - ~/.gitconfig:/home/aiuser/.gitconfig:ro
      - ~/.git-credentials:/home/aiuser/.git-credentials:ro
      - ~/.config/gh:/home/aiuser/.config/gh:ro
    environment:
      - TEST_MODE=true
    privileged: true
    stdin_open: true
    tty: true

