services:
  ai-container:
    build:
      context: .
      args:
        OPENCLAW_GATEWAY_TOKEN: 3dd2ece4eddf27a09106872b41441bc9ba37005f2b5769cb6c1d4040f0606ad0
    image: openclaw-container-ai-container
    container_name: aihost
    hostname: aihost
    ports:
      - "2222:2222"
      - "8443:8443"
    networks:
      - openclaw-net
    volumes:
      - ~/.ssh:/home/aiuser/.ssh:ro
      - ~/.gitconfig:/home/aiuser/.gitconfig:ro
      - ~/.git-credentials:/home/aiuser/.git-credentials:ro
      - ~/.config/gh:/home/aiuser/.config/gh:ro
      - systemd-config:/home/aiuser/.config/systemd
      - openclaw-data:/home/aiuser/.openclaw
    privileged: true
    stdin_open: true
    tty: true
    restart: always
    environment:
      - OPENCLAW_GATEWAY_TOKEN=3dd2ece4eddf27a09106872b41441bc9ba37005f2b5769cb6c1d4040f0606ad0

networks:
  openclaw-net:
    driver: bridge

volumes:
  systemd-config:
  openclaw-data:
